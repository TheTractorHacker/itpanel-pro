name: Build apps and installers

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # Pinned explicitly (rather than relying on windows-latest's default)
      # since the installer now refuses to run on non-x64 Windows
      # (ArchitecturesAllowed=x64 in ITPanelPro.iss) - a 32-bit build here
      # would produce an exe the installer itself would reject.
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          architecture: 'x64'

      - name: Install Python dependencies
        working-directory: Windows
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build tray app exe with PyInstaller
        working-directory: Windows
        run: pyinstaller itpanel_pro.spec

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\ITPanelPro.iss'

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: itpanel-pro-windows
          path: |
            Windows/dist/ITPanelPro.exe
            installer/Output/ITPanelProSetup.exe

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Windows/dist/ITPanelPro.exe
            installer/Output/ITPanelProSetup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk python3-gi gir1.2-appindicator3-0.1 scrot

      - name: Install Python dependencies
        working-directory: Linux
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build binary with PyInstaller
        working-directory: Linux
        run: pyinstaller itpanel_pro.spec

      - name: Package release bundle
        working-directory: Linux
        run: |
          mkdir -p package
          cp dist/ITPanelPro package/
          cp install.sh itpanel-pro.desktop package/
          cp -r assets package/
          tar -czf itpanel-pro-linux.tar.gz -C package .

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: itpanel-pro-linux
          path: Linux/itpanel-pro-linux.tar.gz

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: Linux/itpanel-pro-linux.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        working-directory: macOS
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build app with PyInstaller
        working-directory: macOS
        run: pyinstaller itpanel_pro.spec

      - name: Package release bundle
        working-directory: macOS
        run: |
          mkdir -p package
          cp -R dist/ITPanelPro.app package/
          cp install.sh com.foleyit.itpanelpro.plist package/
          cd package && zip -r ../itpanel-pro-macos.zip .

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: itpanel-pro-macos
          path: macOS/itpanel-pro-macos.zip

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: macOS/itpanel-pro-macos.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
