name: Build Windows app and installer

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        working-directory: Windows
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build tray app exe with PyInstaller
        working-directory: Windows
        run: pyinstaller itflow_quick_ticket.spec

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\ITFlowQuickTicket.iss'

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: itflow-quick-ticket-windows
          path: |
            Windows/dist/ITFlowQuickTicket.exe
            installer/Output/ITFlowQuickTicketSetup.exe

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Windows/dist/ITFlowQuickTicket.exe
            installer/Output/ITFlowQuickTicketSetup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
